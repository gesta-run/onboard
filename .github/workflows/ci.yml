name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify installer syntax
        run: |
          sh -n artifacts/install-agent.sh
          find artifacts/agent -name install.sh -print0 | xargs -0 -n1 sh -n

      - name: Verify checksums
        run: |
          set -euo pipefail
          find artifacts/agent -name SHA256SUMS -execdir sha256sum -c SHA256SUMS \;
